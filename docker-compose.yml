services:

  # ======== PostgreSQL
  db:
    image: postgres:16
    container_name: admindashboard-db
    restart: always
    environment:
      POSTGRES_DB: ${Postgres__Database}
      POSTGRES_USER: ${Postgres__User}
      POSTGRES_PASSWORD: ${Postgres__Password}
    ports:
      - "${Postgres__Port}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - admindashboard-network



  # ======== API
  api:
    container_name: admindashboard-api
    build:
      context: ./backend
      dockerfile: AdminDashboard.Api/Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Default: Host=${Postgres__Host};Port=${Postgres__Port};Database=${Postgres__Database};Username=${Postgres__User};Password=${Postgres__Password}

      Jwt__Key: ${Jwt__Key}
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}
      Jwt__AccessTokenMinutes: ${Jwt__AccessTokenMinutes}
      Jwt__RefreshTokenDays: ${Jwt__RefreshTokenDays}
    ports:
      - "5000:8080"
    networks:
      - admindashboard-network



# ======== Frontend Vite + NGINX
  frontend:
    container_name: admindashboard-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://admindashboard-api:8080/api
    restart: always
    depends_on:
      - api
    ports:
      - "5173:80"
    networks:
      - admindashboard-network



# ======== Volumes
volumes:
  postgres_data:



# ======== Network
networks:
  admindashboard-network:
    driver: bridge